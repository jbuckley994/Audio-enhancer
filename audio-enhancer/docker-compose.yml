version: "3.9"

services:
  audio-enhancer:
    build: .
    image: audio-enhancer:latest
    container_name: audio-enhancer
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # Persist uploads & outputs
      - ./config:/app/config      # Optional custom config
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-2048}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Nginx reverse proxy with larger upload limits
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - audio-enhancer
    profiles:
      - production
